<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市編輯器</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: SF Pro, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #frame {
      width: 2560px;
      height: 1440px;
      background: #ffffff;
      position: relative;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .rect1 {
      box-sizing: border-box;
      position: absolute;
      width: 771px;
      height: 58px;
      left: 921px;
      top: 601px;
      background: #FFFFFF;
      border: 1px solid #E9E9E9;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 29px;
      transition: top 0.35s ease;
      z-index: 1;
    }

    .ellipse2 {
      position: absolute;
      width: 36px;
      height: 36px;
      left: 932px;
      top: 612px;
      background: #F3F3F3;
      border-radius: 50%;
      z-index: 9;
      display: none;
    }

    /* Rectangle 4 */
    .rect4 {
      box-sizing: border-box;
      position: absolute;
      width: 234px;
      height: 321px;
      left: 924px;
      top: 647px;
      background: #FFFFFF;
      border: 1px solid #E9E9E9;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 15px;
      display: none;
      z-index: 15;
    }

    /* Ellipse 3 (mic click) */
    .ellipse3 {
      position: absolute;
      width: 36px;
      height: 36px;
      left: 1604px;
      top: 612px;
      background: #F3F3F3;
      border-radius: 50%;
      z-index: 19;
      display: none;
    }

    .ellipse1 {
      position: absolute;
      width: 36px;
      height: 36px;
      left: 1645px;
      top: 612px;
      background: #000000;
      border-radius: 50%;
      cursor: pointer;
      transition: top 0.35s ease;
      z-index: 20;
    }

    .add {
      position: absolute;
      width: auto;
      min-width: 120px;
      height: 24px;
      left: 938px;
      top: 618px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: top 0.35s ease;
      z-index: 10;
      cursor: pointer;
    }

    .mic {
      position: absolute;
      width: 16px;
      height: 16px;
      left: 1614px;
      top: 622px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: top 0.35s ease;
      z-index: 20;
      cursor: pointer;
    }

    .arrow {
      position: absolute;
      width: 24px;
      height: 24px;
      left: 1651px;
      top: 618px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: top 0.35s ease;
      z-index: 20;
    }

    .rect5 {
      position: absolute;
      height: 44px;
      left: 1631px;
      top: 8px;
      background: #F4F4F4;
      border-radius: 22px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #000;
      padding: 0 15px;
      box-sizing: border-box;
      white-space: nowrap;
      z-index: 50;
    }

    .msg {
      position: absolute;
      left: 923px;
      top: 97px;
      font-family: Inter, sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      color: #000;
      white-space: nowrap;
      z-index: 100;
    }

    .add input {
      border: none;
      outline: none;
      font-size: 16px;
      font-weight: 500;
      color: #000;
      background: transparent;
      width: 200px;
    }
  </style>
</head>
<body>

<div id="frame">

  <div class="ellipse2" id="ellipse2"></div>
  <div class="ellipse3" id="ellipse3"></div>

  <div class="msg" id="msg"></div>
  <div class="rect5" id="rect5"></div>

  <div class="rect1" id="rect"></div>
  <div class="rect4" id="rect4"></div>
  <div class="ellipse1" id="btn"></div>

  <div class="add" id="add">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M11 13H5V11H11V5H13V11H19V13H13V19H11V13Z" fill="black"/></svg>
    <input type="text" placeholder="想問就問" />
  </div>

  <div class="mic" id="mic">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 10C9.10457 10 10 9.10457 10 8V3.33333C10 2.22876 9.10457 1.33333 8 1.33333C6.89543 1.33333 6 2.22876 6 3.33333V8C6 9.10457 6.89543 10 8 10Z" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M12.6667 8C12.6667 10.9455 10.9455 13.3333 8 13.3333C5.05448 13.3333 3.33333 10.9455 3.33333 8" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M8 13.3333V15.3333" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M5.33333 15.3333H10.6667" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="arrow" id="arrow">
    <svg viewBox="0 0 24 24">
      <path d="M12 18V6" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M7 11l5-5 5 5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

</div>

<script>
let moved = false;
let ellipseShown = false;
let rect4Shown = false;
let micShown = false;

const rect = document.getElementById("rect");
const rect4 = document.getElementById("rect4");
const btn = document.getElementById("btn");
const add = document.getElementById("add");
const arrow = document.getElementById("arrow");
const rect5 = document.getElementById("rect5");
const input = document.querySelector("input");
const msg = document.getElementById("msg");
const ellipse2 = document.getElementById("ellipse2");
const ellipse3 = document.getElementById("ellipse3");
const mic = document.getElementById("mic");

function typeText(text, el) {
  el.textContent = "";
  let i = 0;
  const timer = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(timer);
  }, 80);
}

function send() {
  if (moved) return;

  const text = input.value.trim();

  rect5.style.display = "none";
  if (text === "") return;

  // 1. 純前端只負責視覺與動畫：滑順將輸入框向下滾動
  rect.style.top = "1352px";
  btn.style.top = "1363px";
  add.style.top = "1369px";
  arrow.style.top = "1369px";
  mic.style.top = "1373px";

  rect5.style.display = "flex";
  rect5.textContent = text;

  // 在等待雲端回應時，顯示思考提示
  msg.textContent = "正在思考中...";

  // 2. 核心傳送：將資料拋向雲端的 Vercel Serverless Function 隱形大腦
  fetch('/api/chat', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message: text })
  })
  .then(response => {
    if (!response.ok) throw new Error('雲端伺服器回應異常');
    return response.json();
  })
  .then(data => {
    // 3. 接收大腦處理完的對話（包含隨機對話與自研模型回答），播放打字機動畫
    if (data.reply) {
      typeText(data.reply, msg);
    } else if (data.error) {
      msg.textContent = "錯誤: " + data.error;
    }
  })
  .catch(error => {
    // 異常攔截機制，確保網頁永不死機
    msg.textContent = "系統提示：目前連線逾時，請確認雲端大腦狀態。";
    console.error('Error:', error);
  });

  input.value = "";
}

// 綁定按鈕與鍵盤事件
btn.addEventListener("click", send);
arrow.addEventListener("click", send);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
