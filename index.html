<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山中問答 · 本地語言模型</title>
<style>
  :root {
    --bg: #141815;
    --panel: #1c211d;
    --panel-border: #2a2f2a;
    --ink: #ece8de;
    --ink-dim: #9aa093;
    --accent: #6f9a6e;
    --accent-soft: rgba(111, 154, 110, 0.16);
    --user-bubble: #2a3428;
    --error: #c97b63;
    --serif: "Noto Serif TC", "Songti TC", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 背景加一點極淡的水墨紋理感,呼叫語料裡「山」的意象 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(111,154,110,0.08), transparent 60%),
      radial-gradient(ellipse 50% 30% at 100% 100%, rgba(111,154,110,0.05), transparent 60%);
    pointer-events: none;
  }

  .app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 28px 24px 16px;
    border-bottom: 1px solid var(--panel-border);
  }

  header .eyebrow {
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
  }

  header h1 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    margin: 6px 0 4px;
    letter-spacing: 0.02em;
  }

  header p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-dim);
    line-height: 1.6;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .messages:empty::before {
    content: "在下方輸入文字,按下送出,模型會接著你的話繼續說下去。";
    color: var(--ink-dim);
    font-size: 14px;
    margin: auto;
    text-align: center;
    max-width: 320px;
    line-height: 1.8;
  }

  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    color: var(--ink);
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-bottom-left-radius: 4px;
  }

  .msg.assistant .label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .msg.error {
    align-self: flex-start;
    background: transparent;
    border: 1px solid var(--error);
    color: var(--error);
    font-size: 13px;
  }

  .msg.loading {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--ink-dim);
    font-size: 14px;
  }

  .dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin-right: 3px;
    border-radius: 50%;
    background: var(--ink-dim);
    animation: blink 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.25; }
    40% { opacity: 1; }
  }

  form.composer {
    display: flex;
    gap: 10px;
    padding: 16px 24px 24px;
    border-top: 1px solid var(--panel-border);
    background: var(--bg);
  }

  form.composer textarea {
    flex: 1;
    resize: none;
    height: 48px;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.4;
    outline: none;
    transition: border-color 0.15s ease;
  }

  form.composer textarea::placeholder { color: var(--ink-dim); }

  form.composer textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  form.composer button {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #0f130f;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  form.composer button:hover { opacity: 0.9; }
  form.composer button:active { transform: scale(0.95); }

  form.composer button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  form.composer button:focus-visible,
  form.composer textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  @media (max-width: 480px) {
    header { padding: 20px 16px 14px; }
    .messages { padding: 16px; }
    form.composer { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="eyebrow">本地訓練 · 字元級語言模型</div>
      <h1>山中問答</h1>
      <p>這裡的每一句回覆,都是 Python 訓練出來的小型模型即時生成的,不是查表得到的固定答案。</p>
    </header>

    <div class="messages" id="messages"></div>

    <form class="composer" id="composer">
      <textarea
        id="prompt"
        placeholder="輸入一段話,例如:從前有一座山"
        maxlength="200"
        required
      ></textarea>
      <button type="submit" id="sendBtn" aria-label="送出">➤</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("composer");
    const textarea = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, role) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      if (role === "assistant") {
        const label = document.createElement("span");
        label.className = "label";
        label.textContent = "模型生成";
        el.appendChild(label);
        el.appendChild(document.createTextNode(text));
      } else {
        el.textContent = text;
      }
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function addLoading() {
      const el = document.createElement("div");
      el.className = "msg loading";
      el.innerHTML = '生成中 <span class="dots"><span></span><span></span><span></span></span>';
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    // Enter 送出,Shift+Enter 換行
    textarea.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const prompt = textarea.value.trim();
      if (!prompt) return;

      addMessage(prompt, "user");
      textarea.value = "";
      sendBtn.disabled = true;

      const loadingEl = addLoading();

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });
        const data = await res.json();

        loadingEl.remove();

        if (!res.ok || data.error) {
          addMessage(data.error || "發生未知錯誤,請稍後再試。", "error");
        } else {
          addMessage(data.reply || "(模型沒有生成任何內容)", "assistant");
        }
      } catch (err) {
        loadingEl.remove();
        addMessage("無法連線到伺服器,請確認 server.py 是否正在執行。", "error");
      } finally {
        sendBtn.disabled = false;
        textarea.focus();
      }
    });
  </script>
</body>
</html>
